<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRON SURVIVAL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        .menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: rgba(0, 0, 0, 0.9); padding: 30px;
            border: 2px solid #00f2ff; border-radius: 15px; box-shadow: 0 0 20px #00f2ff; z-index: 100;
        }
        .ship-container { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .ship-choice { width: 80px; cursor: pointer; border: 2px solid transparent; padding: 10px; transition: 0.3s; }
        .selected { border-color: #ff0044 !important; box-shadow: 0 0 10px #ff0044; }
        .btn { background: #00f2ff; color: #000; border: none; padding: 12px 30px; margin: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; font-family: 'Courier New'; }
        .ui { position: fixed; top: 20px; left: 20px; pointer-events: none; z-index: 50; }
        .stat-box { background: rgba(0, 0, 0, 0.7); padding: 10px; border-left: 4px solid #00f2ff; margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- NEON RED LOGIN BOX -->
<div id="loginOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; justify-content: center; align-items: center;">
    <div style="width: 420px; padding: 40px; background: #000; border: 3px solid #ff0044; border-radius: 20px; box-shadow: 0 0 30px #ff0044; text-align: center;">
        <h1 style="color: #ff0044; text-shadow: 0 0 10px #ff0044;">SYSTEM ACCESS</h1>
        <div style="color: #00f2ff; text-align: left; margin: 20px 0; font-size: 14px; border: 1px solid #00f2ff33; padding: 15px;">
            <p>🖱️ <b>MOVE:</b> Mouse Follow</p>
            <p>⏸️ <b>PAUSE:</b> ESC Key</p>
            <p>💥 <b>PULSE:</b> Left Click</p>
            <p>⚡ <b>SUPER:</b> Right Click</p>
        </div>
        <input type="text" id="playerInput" placeholder="ENTER PILOT NAME" style="width: 80%; padding: 10px; background: #111; border: 2px solid #ff0044; color: #ff0044; text-align: center; font-weight: bold; margin-bottom: 20px; outline: none;">
        <br>
        <button onclick="finalizeLogin()" style="padding: 15px 40px; background: #ff0044; color: white; border: none; cursor: pointer; font-weight: bold;">ENTER BATTLE</button>
    </div>
</div>

<div class="ui">
    <div class="stat-box">SCORE: <span id="scr">0</span></div>
    <div class="stat-box">HI-SCORE: <span id="hscr">0</span></div>
    <div class="stat-box">PULSE: <span id="pCharge">READY</span></div>
    <div class="stat-box">SUPER: <span id="sCharge">READY</span></div>
</div>

<div id="startMenu" class="menu" style="display: none;">
    <h1 style="color: #00f2ff;">SENTRON SURVIVAL</h1>
    <div class="ship-container">
        <img src="rocket.png" id="ship1" class="ship-choice selected" onclick="selectShip('rocket.png', 'ship1')">
        <img src="ufo.png" id="ship2" class="ship-choice" onclick="selectShip('ufo.png', 'ship2')">
    </div>
    <button class="btn" onclick="initGame(1)">EASY MODE</button>
    <button class="btn" onclick="initGame(2)">MEDIUM MODE</button>
    <button class="btn" onclick="initGame(3)">HARD MODE</button>
</div>

<div id="pauseMenu" class="menu" style="display: none;">
    <h1 style="color: #ffff00;">SYSTEM PAUSED</h1>
    <button class="btn" onclick="togglePause()">RESUME</button>
    <button class="btn" onclick="quitGame()" style="background: #ff0044; color: #fff;">QUIT</button>
</div>

<div id="gameOver" style="display: none;"></div>
<canvas id="gameCanvas"></canvas>
<script src="game.js"></script>
</body>
</html>
