<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentron Survival: Sky High</title>
    <style>
        body { margin: 0; background: #000510; color: #00f2ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        
        .ui { position: absolute; top: 15px; left: 15px; pointer-events: none; font-weight: bold; z-index: 5; }
        .blue-neon { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; margin-bottom: 5px; }
        .yellow-neon { color: #ffff00; text-shadow: 0 0 10px #ffff0000; padding: 2px 5px; background: rgba(255, 255, 0, 0.019); border-radius: 5px; }

        .menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 10, 30, 0.95); border: 3px solid #00f2ff; border-radius: 30px; 
            padding: 30px; text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            display: none; z-index: 10; min-width: 350px;
        }
        #startMenu { display: block; }
        h1 { color: #ff0055; text-shadow: 0 0 20px #ff0055; margin-bottom: 15px; }
        
        .ship-options { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .ship-choice { width: 60px; height: 60px; cursor: pointer; border: 2px solid transparent; padding: 8px; transition: 0.4s; border-radius: 15px; }
        .ship-choice.selected { background: rgba(0, 242, 255, 0.2); border-color: #00f2ff; box-shadow: 0 0 15px #00f2ff; }

        button { 
            background: transparent; border: 2px solid #00f2ff; color: #00f2ff;
            padding: 12px; font-size: 16px; cursor: pointer; margin: 8px 0;
            transition: 0.3s; border-radius: 20px; display: block; width: 100%; font-weight: bold;
        }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
    </style>
</head>
<div id="rulesOverlay" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 350px; padding: 25px; background: rgba(0, 0, 0, 0.95); border: 3px solid #00f2ff; border-radius: 20px; color: #00f2ff; box-shadow: 0 0 20px #00f2ff; text-align: center; z-index: 9999; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <h1 style="text-shadow: 0 0 10px #00f2ff; margin-bottom: 10px;">HOW TO PLAY</h1>
    <div style="text-align: left; font-size: 14px; margin-bottom: 20px;">
        <p>🚀 <b>MOVEMENT:</b> Use WASD or Arrow Keys</p>
        <p>⏸️ <b>PAUSE:</b> Press 'P' to stop/start</p>
        <p>💥 <b>PULSE:</b> Spacebar (Normal)</p>
        <p>⚡ <b>SUPER:</b> Shift Key (Big Blast!)</p>
        <p>👾 <b>GOAL:</b> Survive the swarm as long as possible!</p>
    </div>
    <button onclick="closeRules()" style="background: #00f2ff; color: black; border: none; padding: 10px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase;">Continue to Game</button>
</div>

<body>
    <div class="ui">
        <div class="blue-neon">SCORE: <span id="scr">0</span> | HIGH: <span id="hscr">0</span></div>
        <div class="blue-neon">PULSE TIMER (7s): <span id="pCharge">READY</span></div>
        <div class="yellow-neon">SUPER PULSE (30s): <span id="sCharge">WAIT</span></div>
    </div>

    <div id="startMenu" class="menu">
        <h1>SENTRON SURVIVAL</h1>
        <div class="ship-options">
            <img src="rocket.png" class="ship-choice selected" id="ship1" onclick="selectShip('rocket.png', 'ship1')">
            <img src="rocket-gold.png" class="ship-choice" id="ship2" onclick="selectShip('rocket-gold.png', 'ship2')">
            <img src="rocket-neon.png" class="ship-choice" id="ship3" onclick="selectShip('rocket-neon.png', 'ship3')">
        </div>
        <button onclick="initGame(1)">EASY MODE</button>
        <button onclick="initGame(2)">MEDIUM MODE</button>
        <button onclick="initGame(3)">HARD MODE</button>
    </div>

    <div id="pauseMenu" class="menu">
        <h1>PAUSED</h1>
        <button onclick="togglePause()">RESUME</button>
        <button onclick="quitGame()">QUIT</button>
    </div>

    <div id="gameOver" class="menu" style="border-color: #ff0055;">
        <h1 style="color: #ff0055;">GAME OVER</h1>
        <button onclick="location.reload()">RETRY</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
